events {}

http {
    server {
        listen 80;

        # 1. Запити до бекенду (C# ASP.NET)
        # Всі запити, що починаються з /api, летять на порт 8080
        location /api/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2. Запити до фронтенду (React Vite)
        # Всі інші запити (сторінки, картинки, скрипти) летять на порт 5173
        location / {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Важливо для Vite: підтримка WebSocket для Hot Module Replacement
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}