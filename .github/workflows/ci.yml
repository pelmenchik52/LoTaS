name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore ./back-end

    - name: Build
      run: dotnet build ./back-end --configuration Release --no-restore

    - name: Test
      run: dotnet test ./back-end --no-restore --verbosity normal
      continue-on-error: true  # Since there might be no tests yet

  build-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: front-end/package-lock.json

    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      working-directory: front-end

    - name: Build
      run: npm run build
      working-directory: front-end

  build-docker:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./back-end
        file: ./back-end/Dockerfile
        push: false
        tags: logistics-backend:latest

    - name: Build frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./front-end
        file: ./front-end/Dockerfile
        push: false
        tags: logistics-frontend:latest

    - name: Test Docker Compose
      run: docker compose config