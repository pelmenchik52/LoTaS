version: '3.8'

services:
  # 1. MySQL
  db:
    image: mysql:8.0
    container_name: logistics_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword 
      MYSQL_DATABASE: logistics_db  
    ports:
      - "3306:3306" # Залишаємо для прямого доступу до бази через IDE
    volumes:
      - mysql_data:/var/lib/mysql      

  # 2. C# ASP.NET 
  backend:
    build:
      context: ./back-end             
      dockerfile: Dockerfile
    container_name: logistics_backend
    # ПОРТИ ПРИБРАНО - тепер бекенд захований
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Port=3306;Database=logistics_db;User=root;Password=rootpassword;
    depends_on:
      - db

  # 3. React (Vite)
  frontend:
    build:
      context: ./front-end                       
      dockerfile: Dockerfile
    container_name: logistics_frontend
    # ПОРТИ ПРИБРАНО - тепер фронтенд захований
    environment:
      - VITE_API_URL=/api # ВАЖЛИВА ЗМІНА: відносний шлях замість localhost
    volumes:
      - ./front-end/src:/app/src                 
    depends_on:
      - backend

  # 4. NGINX (Швейцар)
  nginx:
    image: nginx:alpine
    container_name: logistics_nginx
    ports:
      - "80:80" # Тільки цей порт стирчить назовні для Ngrok
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data: